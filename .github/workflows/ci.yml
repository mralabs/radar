name: ci

on:
  push:
    branches: [main]
  pull_request: {}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test tests
      # dual-runtime invariant: the CLI must run on bare node at the
      # documented FLOOR (22.18.0 = first version with default type
      # stripping), not just on whatever the runner ships.
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.18.0
      - run: node skills/radar/scripts/radar.ts help > /dev/null
