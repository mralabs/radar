name: radar check
description: >
  Weekly ecosystem check for repos tracked with radar: fetches latest
  versions of tracked tools, writes a run summary, commits .radar/
  state, and maintains a rolling "Radar digest" issue. Consumers pin
  this action to a commit SHA (radar init --workflow does that for you),
  so no floating code ever runs in their CI.

runs:
  using: composite
  steps:
    # ubuntu-latest ships Node ≥ 22.18, which runs the .ts CLI natively —
    # no runtime setup step. The CLI comes from THIS action's pinned
    # checkout ($GITHUB_ACTION_PATH), never from a floating ref.
    - name: Run check
      id: check
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        node "$GITHUB_ACTION_PATH/skills/radar/scripts/radar.ts" check --json > /tmp/radar.json
        echo "updates=$(jq '.updates | length' /tmp/radar.json)" >> "$GITHUB_OUTPUT"
        echo "errors=$(jq '.errors | length' /tmp/radar.json)" >> "$GITHUB_OUTPUT"

    - name: Write run summary
      shell: bash
      run: |
        {
          echo "## 📡 Radar weekly check"
          echo ""
          if [ "$(jq '.updates | length' /tmp/radar.json)" != "0" ]; then
            echo "### Updates"
            jq -r '.updates[] | "- **\(.tool.name)**: \(.lastVersion) → \(.currentVersion)"' /tmp/radar.json
            echo ""
          fi
          if [ "$(jq '.baselined | length' /tmp/radar.json)" != "0" ]; then
            echo "### Newly tracked"
            jq -r '.baselined[] | "- \(.tool.name): tracking from \(.version)"' /tmp/radar.json
            echo ""
          fi
          if [ "$(jq '.errors | length' /tmp/radar.json)" != "0" ]; then
            echo "### ⚠ Check errors"
            jq -r '.errors[] | "- **\(.tool.name)**: \(.error)"' /tmp/radar.json
            echo ""
          fi
          echo "Up to date: $(jq '.upToDate | length' /tmp/radar.json) · Errors: $(jq '.errors | length' /tmp/radar.json)"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Commit updated state
      shell: bash
      run: |
        git config user.name "radar-bot"
        git config user.email "radar-bot@users.noreply.github.com"
        git add .radar/versions.json
        git diff --cached --quiet || git commit -m "chore(radar): weekly check" && git push

    # Persistent fetch errors (renamed repo, deleted package) must surface
    # here too — a tool that errors every week is silently untracked, and
    # the Actions summary alone notifies nobody.
    - name: Update digest issue
      if: steps.check.outputs.updates != '0' || steps.check.outputs.errors != '0'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Stable fingerprint of the update+error set — independent of output format
        FP=$(jq -r '(.updates[] | "\(.tool.id)@\(.currentVersion)"), (.errors[] | "err \(.tool.id) \(.error)")' /tmp/radar.json | sort | shasum -a 256 | cut -c1-12)
        UPDATE_LINES=$(jq -r '.updates[] | "- **\(.tool.name)**: \(.lastVersion) → \(.currentVersion)"' /tmp/radar.json)
        ERROR_LINES=$(jq -r '.errors[] | "- **\(.tool.name)**: \(.error)"' /tmp/radar.json)

        SECTIONS=""
        if [ -n "$UPDATE_LINES" ]; then
          SECTIONS=$(printf '### Updates\n%s' "$UPDATE_LINES")
        fi
        if [ -n "$ERROR_LINES" ]; then
          SECTIONS=$(printf '%s\n\n### ⚠ Check errors — these tools are not being tracked\n%s' "$SECTIONS" "$ERROR_LINES")
        fi

        gh label create radar --color 1D76DB --description "radar ecosystem updates" --force

        # One rolling digest issue: reuse the open one, reopen a closed
        # one, create only if none exists
        NUM=$(gh issue list --label radar --state open --limit 1 --json number --jq '.[0].number // empty')
        if [ -z "$NUM" ]; then
          NUM=$(gh issue list --label radar --state closed --limit 1 --json number --jq '.[0].number // empty')
          if [ -n "$NUM" ]; then gh issue reopen "$NUM"; fi
        fi
        if [ -z "$NUM" ]; then
          URL=$(gh issue create --title "📡 Radar digest" --label radar \
            --body "Rolling digest of ecosystem updates. Run \`/radar\` locally for analysis.")
          NUM="${URL##*/}"
        fi

        # Same update set already reported? (fingerprint lives in comments)
        if gh issue view "$NUM" --json body,comments \
            --jq '[.body, .comments[].body] | join("\n")' | grep -q "radar-fingerprint: $FP"; then
          echo "Fingerprint $FP already reported on #$NUM — skipping."
          exit 0
        fi

        # Body = current state (edits don't notify); comment = what's new
        # (comments DO notify subscribers)
        gh issue edit "$NUM" --body "$(printf 'Pending as of %s:\n\n%s\n\nRun `/radar` locally for analysis and recommendations.\n\n<!-- radar-fingerprint: %s -->' "$(date -u +%F)" "$SECTIONS" "$FP")"
        gh issue comment "$NUM" --body "$(printf 'New since last digest (%s):\n\n%s\n\n<!-- radar-fingerprint: %s -->' "$(date -u +%F)" "$SECTIONS" "$FP")"
