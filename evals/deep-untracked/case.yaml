schema_version: "1.0"
name: deep-untracked
description: >
  `/radar deep <name>` on an UNTRACKED tool must still do the research and
  close with an add/skip recommendation — without putting the tool in the
  registry. Covers the "registry stays curated" invariant at the deep entry
  point; curated-registry covers it at init.
tags: [invariant, deep]

context:
  scaffold_script: ./scaffold.sh

execution:
  max_turns: 25
  timeout_seconds: 420
  allowed_tools: [Read, Glob, Grep, Skill, Bash, WebFetch, WebSearch]
  prompt: "/radar deep logseq"

runs: 3

graders:
  # Outcome, not mechanism — see AGENTS.md. Logseq must not appear in the
  # registry by ANY route (radar.ts add, hand-edit, or an ad-hoc script).
  - type: regex
    name: untracked-tool-stays-untracked
    target:
      source: file
      path: .radar/registry.json
    pattern: "logseq"
    flags: "i"
    match: not_contains
    weight: 3

  - type: llm
    name: researches-and-recommends
    focus: last_message
    weight: 2
    criteria: |
      The agent must have RESEARCHED Logseq and closed with a recommendation,
      not refused for being untracked.

      PASS: the report says something substantive about what Logseq actually
      is (e.g. block-based outliner, local-first markdown/org files, open
      source), compares it to notemesh, and ends with a reasoned
      recommendation to add it (naming a category, most plausibly
      "competitors") or to skip it — with the decision left to the user.
      FAIL: it declines because Logseq is not in the registry, OR it reports
      Logseq as already added, OR it gives no add/skip recommendation.
